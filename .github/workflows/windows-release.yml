name: Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=manual-${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Update app version
        shell: pwsh
        run: |
          $csprojPath = "KeyStats.Windows/KeyStats/KeyStats.csproj"
          $version = "${{ steps.version.outputs.VERSION }}"
          (Get-Content $csprojPath) -replace '<Version>.*</Version>', "<Version>$version</Version>" | Set-Content $csprojPath
          Write-Host "Updated Version to $version"

      - name: Build Windows app
        shell: pwsh
        working-directory: KeyStats.Windows
        run: |
          .\build.ps1 -Configuration Release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: KeyStats.Windows/dist/*.zip

  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: release-assets/windows

      - name: List artifacts
        run: ls -la release-assets/windows

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-assets/windows/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Release
        run: echo "Windows release v${{ needs.build-windows.outputs.version }} created successfully"
